name: Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on v1.0.0, v1.2.3, etc.

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # 1 ── Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2 ── Setup Java (required for Android builds)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3 ── Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      # 4 ── Restore Firebase config files from GitHub Secrets
      - name: Restore google-services.json
        run: |
          echo "${{ secrets.GOOGLESERVICE }}" | base64 --decode > android/app/google-services.json

      - name: Restore firebase_options.dart
        run: |
          echo "${{ secrets.FIREBASEACTIONS }}" | base64 --decode > lib/firebase_options.dart

      # 5 ── Get dependencies
      - name: Flutter pub get
        run: flutter pub get

      # 6 ── Build release APK
      - name: Build APK
        run: flutter build apk --release

      # 7 ── Rename APK to include version tag
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/MemoryVault-${{ github.ref_name }}.apk

      # 8 ── Create GitHub Release and upload APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Memory Vault ${{ github.ref_name }}
          body: |
            ## Memory Vault ${{ github.ref_name }}

            ### Install
            1. Download `MemoryVault-${{ github.ref_name }}.apk`
            2. Enable **Install from unknown sources** on your Android device
            3. Open the APK to install

            ### Requirements
            - Android 6.0 (API 23) or higher
          files: build/app/outputs/flutter-apk/MemoryVault-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}