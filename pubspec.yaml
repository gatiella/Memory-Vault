name: notes
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^9.2.2
  googleapis_auth: ^1.6.0
  googleapis: ^13.2.0
  encrypt: ^5.0.3
  http: ^1.2.2
  local_auth: ^2.3.0
  crypto: ^3.0.5
  flutter_markdown: ^0.7.3+2
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  intl: ^0.19.0
  launcher_name: ^1.0.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  cloud_firestore: ^5.6.12
  flutter_quill: ^11.5.0
  rename_app: ^1.6.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#0A0A0F"
    theme_color: "#4F6EF7"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_icon.png